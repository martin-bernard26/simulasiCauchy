<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Papan Tulis Digital</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to right, #1e3c72, #2a5298);
  color: white;
  text-align: center;
}

h1 {
  margin: 10px;
}

.container {
  display: flex;
  justify-content: space-around;
  padding: 10px;
}

.canvas-box {
  background: white;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 0 10px black;
}

canvas {
  background: #fff;
  border: 2px solid #333;
  border-radius: 10px;
  cursor: crosshair;
}

.controls {
  margin: 10px;
}

button, input {
  margin: 5px;
  padding: 8px;
  border-radius: 5px;
  border: none;
}

button {
  background: #ff4b2b;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #ff416c;
}
</style>
</head>

<body>

<h1>📝 Papan Tulis Digital (2 Panel)</h1>

<div class="controls">
  Warna: <input type="color" id="color" value="#000000">
  Ukuran: <input type="range" id="size" min="1" max="10" value="3">
</div>

<div class="container">
  
  <div class="canvas-box">
    <h3>Papan 1</h3>
    <canvas id="canvas1" width="500" height="400"></canvas><br>
    <button onclick="clearCanvas('canvas1')">Hapus</button>
  </div>

  <div class="canvas-box">
    <h3>Papan 2</h3>
    <canvas id="canvas2" width="500" height="400"></canvas><br>
    <button onclick="clearCanvas('canvas2')">Hapus</button>
  </div>

</div>

<script>
function setupCanvas(canvas) {
  const ctx = canvas.getContext("2d");
  let drawing = false;

  canvas.addEventListener("mousedown", () => drawing = true);
  canvas.addEventListener("mouseup", () => {
    drawing = false;
    ctx.beginPath();
  });

  canvas.addEventListener("mousemove", draw);

  function draw(e) {
    if (!drawing) return;

    const color = document.getElementById("color").value;
    const size = document.getElementById("size").value;

    ctx.lineWidth = size;
    ctx.lineCap = "round";
    ctx.strokeStyle = color;

    ctx.lineTo(e.offsetX, e.offsetY);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.offsetX, e.offsetY);
  }
}

// Setup kedua canvas
setupCanvas(document.getElementById("canvas1"));
setupCanvas(document.getElementById("canvas2"));

// Clear canvas
function clearCanvas(id) {
  const canvas = document.getElementById(id);
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}
</script>

</body>
</html>
