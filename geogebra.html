<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Media Interaktif Grafik (GeoGebra Style)</title>

<!-- GeoGebra Script -->
<script src="https://www.geogebra.org/apps/deployggb.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #2c5364);
    color: white;
}

header {
    text-align: center;
    padding: 15px;
    font-size: 22px;
}


.left {
    padding: 20px;
}

.right {
     padding: 20px;
     border: 2px solid black;
     display: flex;
    justify-content: center;  /* tengah horizontal */
    align-items: center;      /* tengah vertikal */
    
}

input, button {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    background: #00c6ff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
}

.slider {
    margin-top: 10px;
}
</style>
</head>

<body>

<header>Media Interaktif Grafik (GeoGebra)</header>

<div class="container">

    
    <div class="right">
        <div id="ggb-element" style="width:100%; height:500px;"></div>
    </div>

</div>

<script>
let applet;

function initGeoGebra() {
    let params = {
        "appName": "classic",
        "width": 800,
        "height": 500,
        "showToolBar": true,
        "showAlgebraInput": true,
        "showMenuBar": false
    };

    applet = new GGBApplet(params, true);
    applet.inject('ggb-element');
}

window.onload = initGeoGebra;

</script>

</body>
</html>
