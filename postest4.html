<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Submit Data Mahasiswa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.container {
    background: rgba(255,255,255,0.1);
    padding: 30px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    width: 300px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #00c6ff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0072ff;
}
</style>
</head>

<body>

<div class="container">
    <h2>Submit Tugas</h2>

    <input type="text" id="nama" placeholder="Nama">
    <input type="text" id="nim" placeholder="NIM">
    <input type="text" id="link" placeholder="Link Tugas">

    <button onclick="kirim()">Kirim</button>
</div>

<script>
function kirim() {

    let nama = document.getElementById("nama").value;
    let nim = document.getElementById("nim").value;
    let link = document.getElementById("link").value;

    // VALIDASI
    if(nama === "" || nim === "" || link === ""){
        alert("Semua field wajib diisi!");
        return;
    }

    let formURL = "https://docs.google.com/forms/u/0/d/e/1FAIpQLScsBVFgdJmVIr9DIVGh-fpv5VkdL7wH_Fjc8HfCyku-JwIYVw/formResponse";

    let data = new FormData();

    // GANTI dengan entry ID milikmu
    data.append("entry.1663142269", nama);
    data.append("entry.1469095646", nim);
    data.append("entry.1116126720", link);

    fetch(formURL, {
        method: "POST",
        mode: "no-cors",
        body: data
    });

    alert("Data berhasil dikirim!");
    
    document.getElementById("nama").value = "";
    document.getElementById("nim").value = "";
    document.getElementById("link").value = "";
}
</script>

</body>
</html>
