<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Tugas Pembuktian Analisis Real</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255,255,255,0.95);
    padding: 25px;
    border-radius: 15px;
}

h1 {
    text-align: center;
}

input {
    width: 48%;
    padding: 10px;
    margin: 5px;
    border-radius: 10px;
    border: 1px solid #ccc;
}

.card {
    background: #f8fafc;
    margin: 15px 0;
    padding: 15px;
    border-left: 5px solid #ef4444;
    border-radius: 10px;
}

input.link {
    width: 100%;
    margin-top: 10px;
}

button {
    display: block;
    margin: 25px auto;
    padding: 12px 25px;
    border-radius: 20px;
    border: none;
    background: #ef4444;
    color: white;
    cursor: pointer;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="container">

<h1>Tugas Pembuktian (Tulis Tangan)</h1>

<input type="text" id="nama" placeholder="Nama">
<input type="text" id="nim" placeholder="NIM">

<div id="soalContainer"></div>

<button onclick="kirimData()">Kumpulkan Link Jawaban</button>

</div>

<script>
// daftar soal
const soal = [
"Buktikan bahwa supremum suatu himpunan adalah unik.",
"Buktikan bahwa infimum suatu himpunan adalah unik.",
"Buktikan bahwa setiap himpunan terbatas atas memiliki supremum di ℝ.",
"Buktikan bahwa supremum menjadi maksimum jika termasuk dalam himpunan.",
"Buktikan bahwa interval (0,1) tidak memiliki maksimum.",
"Buktikan bahwa ℚ tidak memiliki sifat kelengkapan.",
"Buktikan bahwa setiap himpunan berhingga memiliki maksimum.",
"Buktikan bahwa jika A ⊆ B maka sup A ≤ sup B.",
"Buktikan bahwa untuk setiap ε>0 terdapat elemen mendekati supremum.",
"Buktikan bahwa setiap interval tertutup memiliki maksimum dan minimum."
];

// tampilkan soal
let container = document.getElementById("soalContainer");

soal.forEach((s, i) => {
    container.innerHTML += `
    <div class="card">
        <b>${i+1}. ${s}</b>
        <input type="text" class="link" id="l${i}" placeholder="Masukkan link jawaban tulis tangan">
    </div>`;
});
</script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "API_KEY_ANDA",
  authDomain: "PROJECT_ID.firebaseapp.com",
  databaseURL: "https://PROJECT_ID-default-rtdb.firebaseio.com",
  projectId: "PROJECT_ID",
  storageBucket: "PROJECT_ID.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.kirimData = function(){

    let nama = document.getElementById("nama").value;
    let nim = document.getElementById("nim").value;

    let links = [];

    for(let i=0;i<10;i++){
        let val = document.getElementById("l"+i).value;
        if(val === ""){
            alert("Semua link harus diisi!");
            return;
        }
        links.push(val);
    }

    push(ref(db, "tugas_pembuktian"), {
        nama: nama,
        nim: nim,
        jawaban_link: links,
        waktu: new Date().toLocaleString()
    });

    alert("Link jawaban berhasil dikirim!");
}
</script>

</body>
</html>
